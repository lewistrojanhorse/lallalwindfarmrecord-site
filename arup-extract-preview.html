<!DOCTYPE html>
<html lang="en-AU">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ARUP Extract Preview</title>
<style>
body{font-family:Arial,sans-serif;background:#f6f3ec;color:#111827;margin:0;padding:30px}
main{max-width:1100px;margin:auto}
h1{color:#071538}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.card{background:white;padding:18px;border-radius:14px;border:1px solid #ddd}
img{width:100%;height:auto;display:block;border:1px solid #ddd}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
</style></head>
<body><main><h1>ARUP highlighted extracts</h1>
<p>This preview confirms that all three image extracts are included and visible.</p>
<div class="grid">
<div class="card"><h2>Elaine</h2><img src="images/sonus/arup-elaine-mda-predictive-reference-crop.jpg" alt="Elaine extract"></div>
<div class="card"><h2>Yendon</h2><img src="images/sonus/arup-yendon-mda-predictive-reference-crop.jpg" alt="Yendon extract"></div>
<div class="card"><h2>Stage 2</h2><img src="images/sonus/arup-stage2-mda-predictive-reference-crop.jpg" alt="Stage 2 extract"></div>
</div></main></body></html>
